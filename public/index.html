<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STVDIA LATINA</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/navigation.css" />
    <link rel="stylesheet" href="/vocab-responsive.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <p class="eyebrow">Lingua Latina Study Tool</p>
        <h1>STVDIA LATINA</h1>
        <p>A Familia Romana study companion: summaries, grammar, vocabulary, and exercises.</p>
      </div>
    </header>

    <main class="layout">
      <aside class="panel sidebar-panel">
        <nav class="side-nav" aria-labelledby="side-nav-heading">
          <h2 id="side-nav-heading">Study Navigation</h2>

          <section class="nav-section chapter-nav-section" aria-labelledby="chapter-nav-heading">
            <h3 id="chapter-nav-heading">Chapters</h3>
            <div id="chapter-list" class="chapter-list">Loading…</div>
          </section>

          <section class="nav-section section-nav-section" aria-labelledby="section-nav-heading">
            <h3 id="section-nav-heading">On this page</h3>
            <div id="section-list" class="section-list" aria-live="polite"></div>
          </section>
        </nav>
      </aside>

      <section class="panel content-panel">
        <div id="chapter-content">
          <h2>Select a chapter</h2>
          <p>Choose a Capitulum from the left to start studying.</p>
        </div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
