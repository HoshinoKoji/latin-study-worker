<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Latin Study Worker</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <p class="eyebrow">Lingua Latina Study Tool</p>
        <h1>Latin Study Worker</h1>
        <p>Structured study notes for Familia Romana: summaries, grammar, vocabulary, and exercises.</p>
      </div>
    </header>

    <main class="layout">
      <aside class="panel sidebar-panel">
        <h2>Chapters</h2>
        <div id="chapter-list" class="chapter-list">Loading…</div>
      </aside>

      <section class="panel content-panel">
        <div id="chapter-content">
          <h2>Select a chapter</h2>
          <p>Choose a Capitulum from the left to start studying.</p>
        </div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
